{% load static %}
<link rel="stylesheet" href="{% static 'css/teams.css' %}">

<div class="team-detail-card">
    <h1>{{ team.name }}</h1>
    <p>Department: {{ team.department.name }}</p>

    <h3>Dependencies</h3>

    <div class="dependencies-container">
        {% for dep in dependencies %}
            <span class="dependency-item">Depends on: {{ dep.name }}</span>
        {% empty %}
            <p class="empty-msg">No dependencies</p>
        {% endfor %}
    </div>
</div>
