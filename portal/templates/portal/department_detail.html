{% load static %}
<link rel="stylesheet" href="{% static 'portal/styles.css' %}">
<h1>{{ department.name }}</h1>

<h2>Teams</h2>

{% for team in teams %}
<div>
	<p>
		<a href="/teams/{{ team.id }}/">{{ team.name }}</a>
	</p>

	<p>
		Dependencies:
		{% for dep in team.dependencies.all %}
		{{ dep.name }}
		{% empty %}
		None
		{% endfor %}
	</p>
</div>
{% endfor %}
